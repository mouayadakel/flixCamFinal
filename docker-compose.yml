version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: flixcam-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flixcam
      POSTGRES_PASSWORD: flixcam_dev_password
      POSTGRES_DB: flixcam_rent
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flixcam']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
