# Main CI: lint, type-check, test, build
# Runs on push to main and on pull requests

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, type-check, test, build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U ci 2>/dev/null; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Prisma generate
        run: npm run db:generate
        env:
          DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci?schema=public'

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci?schema=public'

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check
        continue-on-error: true

      - name: Type check
        run: npm run type-check

      - name: Run tests
        run: npm run test -- --passWithNoTests
        env:
          DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci?schema=public'
          AUTH_SECRET: 'ci-secret-minimum-32-characters-long'
          NEXTAUTH_SECRET: 'ci-secret-minimum-32-characters-long'
          NEXTAUTH_URL: 'http://localhost:3000'
          ENCRYPTION_KEY: 'ci-encryption-key-32-chars-long!'

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci?schema=public'
          AUTH_SECRET: 'ci-secret-minimum-32-characters-long'
          NEXTAUTH_SECRET: 'ci-secret-minimum-32-characters-long'
          NEXTAUTH_URL: 'http://localhost:3000'
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder'
          ENCRYPTION_KEY: 'ci-encryption-key-32-chars-long!'

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: ci

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for PostgreSQL
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U ci 2>/dev/null; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Wait for Redis
        run: |
          sudo apt-get update -qq && sudo apt-get install -y redis-tools
          for i in $(seq 1 30); do
            if redis-cli -h localhost -p 6379 ping 2>/dev/null | grep -q PONG; then
              echo "Redis is ready"
              exit 0
            fi
            echo "Waiting for Redis... ($i/30)"
            sleep 2
          done
          echo "Redis did not become ready in time"
          exit 1

      - name: Prisma generate
        run: npm run db:generate
        env:
          DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci?schema=public'

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci?schema=public'

      # DATABASE_URL must use user "ci" – Postgres service creates only that role (no "root")
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: 'true'
          DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci?schema=public'
          REDIS_URL: 'redis://localhost:6379'
          AUTH_SECRET: 'ci-secret-minimum-32-characters-long'
          NEXTAUTH_SECRET: 'ci-secret-minimum-32-characters-long'
          NEXTAUTH_URL: 'http://localhost:3000'
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
          NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder'
          ENCRYPTION_KEY: 'ci-encryption-key-32-chars-long!'
